{% extends 'base.html' %}

{% block title %}
Edit Buku
{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-6">
    <a href="{% url 'buku_detail' buku.id %}" class="text-slate-400 hover:text-slate-600">
        <span class="material-icons-outlined">arrow_back</span>
    </a>
    <div>
        <p class="text-sm text-slate-500">Kelola Buku</p>
        <h1 class="text-2xl font-bold text-slate-900">Edit Buku</h1>
    </div>
</div>

<div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 max-w-2xl">
    <form method="post">
        {% csrf_token %}
        
        <div class="space-y-4">
            <!-- Judul Buku -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Judul Buku</label>
                <input type="text" name="judul" value="{{ buku.judul }}" required
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>
            
            <!-- Pengarang -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Pengarang</label>
                <input type="text" name="pengarang" value="{{ buku.pengarang }}" required
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>
            
            <!-- Kategori -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Kategori</label>
                <select name="kategori" required
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    <option value="Novel" {% if buku.kategori == "Novel" %}selected{% endif %}>Novel</option>
                    <option value="Sejarah" {% if buku.kategori == "Sejarah" %}selected{% endif %}>Sejarah</option>
                    <option value="Pendidikan" {% if buku.kategori == "Pendidikan" %}selected{% endif %}>Pendidikan</option>
                    <option value="Fiksi" {% if buku.kategori == "Fiksi" %}selected{% endif %}>Fiksi</option>
                    <option value="Non-Fiksi" {% if buku.kategori == "Non-Fiksi" %}selected{% endif %}>Non-Fiksi</option>
                </select>
            </div>
            
            <!-- Penerbit -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Penerbit</label>
                <input type="text" name="penerbit" value="{{ buku.penerbit }}" required
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>
            
            <!-- Tahun Terbit -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Tahun Terbit</label>
                <input type="number" name="tahun_terbit" value="{{ buku.tahun_terbit }}" required
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>
            
            <!-- Stok -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Stok</label>
                <input type="number" name="stok" value="{{ buku.stok }}" required
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>
            
            <!-- ISBN -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">ISBN</label>
                <input type="text" name="isbn" value="{{ buku.isbn|default:'' }}" 
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>
            
            <!-- Rak / Lokasi -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Rak / Lokasi</label>
                <select name="rak" required
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    <option value="Rak A-01" {% if buku.rak == "Rak A-01" %}selected{% endif %}>Rak A-01</option>
                    <option value="Rak A-02" {% if buku.rak == "Rak A-02" %}selected{% endif %}>Rak A-02</option>
                    <option value="Rak A-03" {% if buku.rak == "Rak A-03" %}selected{% endif %}>Rak A-03</option>
                    <option value="Rak A-04" {% if buku.rak == "Rak A-04" %}selected{% endif %}>Rak A-04</option>
                    <option value="Rak A-05" {% if buku.rak == "Rak A-05" %}selected{% endif %}>Rak A-05</option>
                    <option value="Rak B-01" {% if buku.rak == "Rak B-01" %}selected{% endif %}>Rak B-01</option>
                    <option value="Rak B-02" {% if buku.rak == "Rak B-02" %}selected{% endif %}>Rak B-02</option>
                </select>
            </div>
            
            <!-- Deskripsi -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Deskripsi</label>
                <textarea name="deskripsi" rows="3"
                          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">{{ buku.deskripsi|default:'' }}</textarea>
                <p class="text-xs text-slate-400 mt-1">Contoh: Novel tentang perjuangan anak-anak Belitung mengejar pendidikan.</p>
            </div>
        </div>
        
        <!-- Tombol -->
        <div class="flex gap-3 mt-6 pt-4 border-t border-slate-200">
            <a href="{% url 'buku_detail' buku.id %}" 
               class="px-6 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-200 transition">
                Batal
            </a>
            <button type="submit" 
                    class="px-6 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition">
                Perbarui Buku
            </button>
        </div>
    </form>
</div>
{% endblock %}
