<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SIPUSTAKA{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Material+Icons+Outlined" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#eff6ff",
                100: "#dbeafe",
                200: "#bfdbfe",
                300: "#93c5fd",
                400: "#60a5fa",
                500: "#3b82f6",
                600: "#2563eb",
                700: "#1d4ed8",
                800: "#1e40af",
                900: "#1e3a8a",
              },
            },
          },
        },
      };
    </script>

    <style>
      body {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
    </style>
</head>

<body class="bg-slate-100 text-slate-900 h-screen overflow-hidden">

<div class="h-screen flex flex-col md:flex-row">
    

    <!-- Sidebar -->
    <aside class="w-full md:w-72 h-screen bg-slate-950 text-slate-100 flex-none flex flex-col">

        <div class="px-6 py-7 border-b border-slate-800">
            <div class="flex items-center gap-3">

                <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-brand-500 to-sky-400 flex items-center justify-center">
                    <span class="text-xl font-bold">p</span>
                </div>

                <div>
                    <p class="text-sm uppercase text-slate-400 tracking-[0.25em]">
                        SIPUSTAKA
                    </p>

                    <h1 class="text-xl font-semibold">
                        Sistem Perpustakaan
                    </h1>
                </div>

            </div>
        </div>

        <nav class="flex-1 overflow-y-auto px-4 py-6 space-y-1">

            <a href="/"
               class="rounded-2xl px-4 py-3 flex items-center gap-3 text-slate-300 hover:bg-slate-900">
                <span class="material-icons-outlined">dashboard</span>
                Dashboard
            </a>

            <a href="{% url 'buku_list'%}"
               class="rounded-2xl px-4 py-3 flex items-center gap-3 text-slate-300 hover:bg-slate-900">
                <span class="material-icons-outlined">menu_book</span>
                Buku
            </a>

            <a href="{% url 'peminjaman_list' %}"
               class="rounded-2xl px-4 py-3 flex items-center gap-3 text-slate-300 hover:bg-slate-900">
                <span class="material-icons-outlined">library_books</span>
                Peminjaman
            </a>

            <a href="{% url 'user_list' %}"
               class="rounded-2xl px-4 py-3 flex items-center gap-3 text-slate-300 hover:bg-slate-900">
                <span class="material-icons-outlined">group</span>
                User
            </a>

        </nav>

       <div class="mt-auto px-6 pb-6">

    <div class="rounded-3xl bg-slate-900 p-5">

        <p class="text-sm text-slate-400">
            User Aktif
        </p>

        <p class="mt-2 font-semibold text-white">
            {{ request.user.username|default:"Administrator" }}
        </p>

    </div>

</div>

    </aside>
    
    <main class="flex-1 overflow-y-auto p-6 md:p-8">

        {% block content %}
        {% endblock %}

    </main>

</div>

</body>
</html>
